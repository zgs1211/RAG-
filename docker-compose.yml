version: "3.8"

services:
  rag-api:
    build: .
    container_name: rag-knowledge-qa
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - VECTOR_DB_TYPE=chroma
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

