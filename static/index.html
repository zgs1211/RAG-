<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 知识问答系统</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f6f8;color:#1a1a2e;display:flex;font-size:14px}
.sidebar{width:280px;background:#fff;border-right:1px solid #e8eaed;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid #e8eaed}
.sidebar-header h1{font-size:16px;font-weight:600}
.sidebar-header p{font-size:12px;color:#888;margin-top:4px}
.sidebar-section{padding:16px 20px;border-bottom:1px solid #e8eaed}
.sidebar-section h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:10px}
.upload-area{border:2px dashed #d0d5dd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover{border-color:#4f6ef7;background:#f8f9ff}
.upload-area.dragover{border-color:#4f6ef7;background:#eef1ff}
.upload-area p{font-size:12px;color:#888}
.upload-area .hint{font-size:11px;color:#aaa;margin-top:4px}
.upload-area input{display:none}
.file-list{list-style:none}
.file-list li{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f1f3;font-size:13px}
.file-list li:last-child{border-bottom:none}
.file-list .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-list .status{font-size:11px;color:#888}
.file-list .status.loading{color:#4f6ef7}
.file-list .status.success{color:#22c55e}
.file-list .status.error{color:#ef4444}
.option-group{margin-bottom:10px}
.option-group:last-child{margin-bottom:0}
.option-group label{font-size:12px;color:#555;display:block;margin-bottom:4px}
.option-group select{width:100%;padding:6px 8px;border:1px solid #d0d5dd;border-radius:6px;font-size:13px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-row label{font-size:12px;color:#555;margin:0}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#d0d5dd;border-radius:20px;transition:.2s}
.toggle .slider::after{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#4f6ef7}
.toggle input:checked+.slider::after{transform:translateX(16px)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:16px 24px;border-bottom:1px solid #e8eaed;background:#fff;display:flex;align-items:center;gap:12px}
.chat-header .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.chat-header .dot.error{background:#ef4444}
.chat-header h2{font-size:15px;font-weight:500;flex:1}
.chat-header .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:#eef1ff;color:#4f6ef7;font-weight:500}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.chat-messages:empty::after{content:"输入问题开始问答，或从左侧上传文档";display:block;text-align:center;color:#aaa;font-size:14px;margin-top:60px}
.message{display:flex;gap:12px;max-width:800px}
.message.user{flex-direction:row-reverse;align-self:flex-end}
.message.bot{align-self:flex-start}
.message .av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:600}
.message.user .av{background:#4f6ef7;color:#fff}
.message.bot .av{background:#1a1a2e;color:#fff}
.message .b{padding:12px 16px;border-radius:12px;line-height:1.6;font-size:14px;word-break:break-word}
.message.user .b{background:#4f6ef7;color:#fff;border-bottom-right-radius:4px}
.message.bot .b{background:#fff;border:1px solid #e8eaed;border-bottom-left-radius:4px}
.message.bot .b p{margin-bottom:6px}
.message.bot .b p:last-child{margin-bottom:0}
.message.bot .b ul,.message.bot .b ol{padding-left:20px;margin-bottom:6px}
.message.bot .b li{margin-bottom:3px}
.cite-box{margin-top:8px;padding-top:8px;border-top:1px solid #e8eaed;font-size:12px}
.cite-box summary{color:#888;cursor:pointer;font-weight:500}
.cite-box .clist{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.cite-box .ci{padding:4px 8px;background:#f8f9ff;border-radius:4px;color:#555}
.cite-box .ci .idx{font-weight:600;color:#4f6ef7;margin-right:4px}
.typing .b{display:flex;gap:5px;align-items:center;padding:14px 20px}
.typing .d{width:6px;height:6px;border-radius:50%;background:#aaa;animation:ty 1.4s infinite}
.typing .d:nth-child(2){animation-delay:.2s}
.typing .d:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{opacity:.3}30%{opacity:1}}
.chat-input{padding:16px 24px;border-top:1px solid #e8eaed;background:#fff}
.chat-input form{display:flex;gap:8px;align-items:flex-end}
.chat-input textarea{flex:1;resize:none;padding:10px 14px;border:1px solid #d0d5dd;border-radius:10px;font-size:14px;font-family:inherit;line-height:1.4;min-height:44px;max-height:120px;outline:none}
.chat-input textarea:focus{border-color:#4f6ef7}
.chat-input button{width:44px;height:44px;border:none;border-radius:10px;background:#4f6ef7;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-input button:hover{background:#3d5bd9}
.chat-input button:disabled{background:#d0d5dd;cursor:not-allowed}
.chat-input button svg{width:18px;height:18px;fill:#fff}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){.sidebar{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid #e8eaed}body{flex-direction:column}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>RAG 知识问答</h1>
    <p>基于检索增强生成</p>
  </div>
  <div class="sidebar-section">
    <h2>上传文档</h2>
    <div class="upload-area" id="uploadArea">
      <p style="font-size:24px;margin-bottom:6px">📄</p>
      <p>点击或拖拽上传文档</p>
      <p class="hint">支持 PDF, DOCX, HTML, MD, TXT</p>
      <input type="file" id="fileInput" multiple accept=".pdf,.docx,.doc,.html,.htm,.md,.txt">
    </div>
  </div>
  <div class="sidebar-section" style="flex:1;overflow-y:auto">
    <h2>已索引文档</h2>
    <ul class="file-list" id="fileList"><li style="color:#aaa;font-size:12px;justify-content:center;padding:20px 0">暂无文档</li></ul>
  </div>
  <div class="sidebar-section">
    <h2>检索设置</h2>
    <div class="option-group">
      <label for="topK">返回结果数</label>
      <select id="topK"><option>3</option><option selected>5</option><option>10</option></select>
    </div>
    <div class="toggle-row">
      <label>多查询扩展</label>
      <label class="toggle"><input type="checkbox" id="multiQuery"><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>HyDE 改写</label>
      <label class="toggle"><input type="checkbox" id="useHyde"><span class="slider"></span></label>
    </div>
  </div>
</div>
<div class="main">
  <div class="chat-header">
    <span class="dot" id="statusDot"></span>
    <h2>问答</h2>
    <span class="badge" id="modelBadge">deepseek-chat</span>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <form id="chatForm">
      <textarea id="chatInput" rows="1" placeholder="输入问题..." autofocus></textarea>
      <button type="submit" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API='/api';let docsLoading={};
const $=id=>document.getElementById(id);
const cm=$('chatMessages'),cf=$('chatForm'),ci=$('chatInput'),sb=$('sendBtn');
const fi=$('fileInput'),ua=$('uploadArea'),fl=$('fileList'),sd=$('statusDot');
const tk=$('topK'),mq=$('multiQuery'),uh=$('useHyde'),tt=$('toast'),mb=$('modelBadge');
ci.addEventListener('input',()=>{ci.style.height='auto';ci.style.height=Math.min(ci.scrollHeight,120)+'px';sb.disabled=!ci.value.trim()});
ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cf.dispatchEvent(new Event('submit'))}});
function toast(msg,ms=3000){tt.textContent=msg;tt.classList.add('show');setTimeout(()=>tt.classList.remove('show'),ms)}
let te=null;
function st(){te=document.createElement('div');te.className='message bot typing';te.innerHTML='<div class="av">R</div><div class="b"><span class="d"></span><span class="d"></span><span class="d"></span></div>';cm.appendChild(te);cm.scrollTop=cm.scrollHeight}
function ht(){if(te){te.remove();te=null}}
function am(r,c,ci){
  const d=document.createElement('div');d.className='message '+r;
  const a=document.createElement('div');a.className='av';a.textContent=r==='user'?'U':'R';
  const b=document.createElement('div');b.className='b';
  if(r==='bot'){
    b.innerHTML=c.replace(/\n/g,'<br>');
    if(ci&&ci.length){
      const dt=document.createElement('details');dt.className='cite-box';
      let html='<summary>'+ci.length+' 个引用来源</summary><div class="clist">';
      ci.forEach(c=>{html+='<div class="ci"><span class="idx">['+c.index+']</span> '+(c.source.split('/').pop()||c.source)+(c.page?' · 第'+c.page+'页':'')+(c.score?' · 分数:'+c.score.toFixed(3):'')+'</div>'});
      html+='</div>';dt.innerHTML=html;b.appendChild(dt);
    }
  } else b.textContent=c;
  d.appendChild(a);d.appendChild(b);cm.appendChild(d);cm.scrollTop=cm.scrollHeight;
}
async function ch(){try{const r=await fetch(API+'/health');if(!r.ok)throw Error();const d=await r.json();sd.className='dot'+(d.status==='ok'?'':' error')}catch(e){sd.className='dot error';toast('服务连接失败',5000)}}
ch();setInterval(ch,30000);
async function hq(q){
  st();sb.disabled=true;
  try{
    const r=await fetch(API+'/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,top_k:parseInt(tk.value),use_multi_query:mq.checked,use_hyde:uh.checked})});
    ht();
    if(!r.ok){const e=await r.json();am('bot','❌ '+(e.detail||'请求失败'));return}
    const d=await r.json();am('bot',d.answer,d.citations);
  }catch(e){ht();am('bot','❌ '+e.message)}finally{sb.disabled=!ci.value.trim()}
}
cf.addEventListener('submit',e=>{e.preventDefault();const q=ci.value.trim();if(!q||sb.disabled)return;am('user',q);ci.value='';ci.style.height='auto';sb.disabled=true;hq(q)});
async function uf(file){
  const fd=new FormData();fd.append('file',file);
  docsLoading[file.name]='loading';rf();
  try{
    const r=await fetch(API+'/documents/upload',{method:'POST',body:fd});
    if(!r.ok){const e=await r.json();docsLoading[file.name]='error';toast('上传失败: '+(e.detail||r.statusText),5000)}
    else{const d=await r.json();docsLoading[file.name]='success';toast('上传成功: '+d.chunks_count+' 个分块')}
  }catch(e){docsLoading[file.name]='error';toast('上传失败: '+e.message,5000)}
  rf();
}
async function rf(){
  let files=[];
  try{const r=await fetch(API+'/documents');if(r.ok)files=(await r.json()).documents||[]}catch(e){}
  const hl=Object.values(docsLoading).some(s=>s==='loading');
  if(!files.length&&!hl){fl.innerHTML='<li style="color:#aaa;font-size:12px;justify-content:center;padding:20px 0">暂无文档</li>';return}
  fl.innerHTML='';
  files.forEach(f=>{const li=document.createElement('li');li.innerHTML='<span class="name">'+f.filename+'</span><span class="status success">已索引</span><span style="font-size:11px;color:#aaa">'+fs(f.size)+'</span>';fl.appendChild(li)});
  Object.entries(docsLoading).forEach(([n,s])=>{if(s==='loading'){const li=document.createElement('li');li.innerHTML='<span class="name">'+n+'</span><span class="status loading">索引中...</span>';fl.appendChild(li)}})
}
function fs(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
ua.addEventListener('click',()=>fi.click());
ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('dragover')});
ua.addEventListener('dragleave',()=>ua.classList.remove('dragover'));
ua.addEventListener('drop',e=>{e.preventDefault();ua.classList.remove('dragover');Array.from(e.dataTransfer.files).forEach(uf)});
fi.addEventListener('change',()=>{Array.from(fi.files).forEach(uf);fi.value=''});
rf();
</script>
</body>
</html>
